function openRoadSelectModal(){
  var html='<div style="max-height:400px;overflow-y:auto"><table class="ant-table" style="width:100%"><thead><tr><th><input type="checkbox" class="ant-checkbox" onclick="toggleAllRoads(this)"></th><th>道路名称</th><th>道路类型</th><th>道路状态</th></tr></thead><tbody>';
  for(var i=0;i<roadData.length;i++){
    var checked=selectedRoads.indexOf(i)>-1?'checked':'';
    html+='<tr><td><input type="checkbox" class="ant-checkbox road-cb" data-idx="'+i+'" '+checked+'></td><td>'+roadData[i].name+'</td><td>'+roadData[i].type+'</td><td><span class="ant-tag '+(roadData[i].status==='开放'?'ant-tag-success':'ant-tag-default')+'">'+roadData[i].status+'</span></td></tr>';
  }

}
function toggleAllRoads(el){
  var cbs=document.querySelectorAll('.road-cb');
  for(var i=0;i<cbs.length;i++) cbs[i].checked=el.checked;
}
function confirmRoadSelect(){
  selectedRoads=[];
  var cbs=document.querySelectorAll('.road-cb');
  for(var i=0;i<cbs.length;i++){if(cbs[i].checked) selectedRoads.push(parseInt(cbs[i].dataset.idx));}
  closeModal();
  renderRoadTable();
}
function renderRoadTable(){
  var el=document.getElementById('roadTableBody');
  if(!el) return;
  if(selectedRoads.length===0){el.innerHTML='<tr><td colspan="4" style="text-align:center;color:#00000073;padding:24px">暂未选择测试路段，请点击"添加路段"按钮选择</td></tr>';return;}
  var h='';
  for(var i=0;i<selectedRoads.length;i++){
    var r=roadData[selectedRoads[i]];
    h+='<tr><td>'+(i+1)+'</td><td>'+r.name+'</td><td>'+r.type+'</td><td><span class="ant-tag '+(r.status==='开放'?'ant-tag-success':'ant-tag-default')+'">'+r.status+'</span></td><td><button class="ant-btn-link danger" onclick="removeRoad('+i+')">删除</button></td></tr>';
  }
  el.innerHTML=h;
}
function removeRoad(idx){selectedRoads.splice(idx,1);renderRoadTable();}
function openVehicleSelectModal(){
  var html='<div style="max-height:400px;overflow-y:auto"><table class="ant-table" style="width:100%"><thead><tr><th><input type="checkbox" class="ant-checkbox" onclick="toggleAllVehicles(this)"></th><th>VIN码</th><th>产品商标</th><th>产品型号</th><th>自动驾驶等级</th></tr></thead><tbody>';

function toggleAllVehicles(el){
  var cbs=document.querySelectorAll('.vehicle-cb');
  for(var i=0;i<cbs.length;i++) cbs[i].checked=el.checked;
}
function confirmVehicleSelect(){
  selectedVehicles=[];

}

  var el=document.getElementById('vehicleTableBody');

  var h='';
  for(var i=0;i<selectedVehicles.length;i++){
    var v=vehicleData[selectedVehicles[i]];
    h+='<tr><td>'+(i+1)+'</td><td>'+v.vin+'</td><td>'+v.brand+'</td><td>'+v.model+'</td><td>'+v.level+'</td><td><button class="ant-btn-link danger" onclick="removeVehicle('+i+')">删除</button></td></tr>';

    h+='</div></div></div>';
  }
  return h+'</div>';
